<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ゲームキューブ版 ファンタシースターオンライン エピソード1&2 武器ドロップテーブル</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./assets/app-icon.png" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">ゲームキューブ版 ファンタシースターオンライン エピソード1&2</p>
        <h1>武器ドロップテーブル</h1>
        <p class="visually-hidden">
          GC版 Phantasy Star Online Episode 1 and 2 weapon drop table.
          GameCube PSO Episode I & II rare item drop table.
        </p>
      </div>
      <div class="header-stats" aria-live="polite">
        <a class="android-link" href="./android.html" aria-label="Android版アプリのインストール方法">
          <img src="./assets/app-icon.png" alt="" />
          <span>Android版</span>
        </a>
        <span><strong id="visibleCount">0</strong>件</span>
        <span><strong id="targetCount">0</strong>目標</span>
      </div>
    </header>

    <main class="layout">
      <aside class="filters" aria-label="絞り込み">
        <section class="filter-section">
          <h2>Episode</h2>
          <div id="episodeButtons" class="segmented"></div>
        </section>

        <section class="filter-section">
          <h2>難易度</h2>
          <div id="difficultyButtons" class="segmented"></div>
        </section>

        <section class="filter-section">
          <div class="section-heading">
            <h2>セクションID</h2>
            <button id="allSectionsButton" class="text-button" type="button">全選択</button>
          </div>
          <div id="sectionButtons" class="section-grid"></div>
        </section>

        <section class="filter-section">
          <div class="section-heading">
            <h2>エリア</h2>
            <button id="allAreasButton" class="text-button" type="button">全選択</button>
          </div>
          <div id="areaFilters" class="check-grid"></div>
        </section>
      </aside>

      <section class="results" aria-label="検索結果">
        <div class="results-toolbar">
          <div class="results-heading">
            <h2 id="resultsTitle">一覧</h2>
            <p id="resultsSummary"></p>
          </div>
          <div class="toolbar-controls">
            <label class="toolbar-search">
              <span class="visually-hidden">アイテムまたはエネミーを検索</span>
              <input id="queryInput" type="search" placeholder="アイテム/エネミー検索" />
            </label>
            <select id="viewMode" aria-label="ビュー">
              <option value="list">一覧</option>
              <option value="compare">比較</option>
            </select>
            <select id="sortMode" aria-label="並び順">
              <option value="area">エリア順</option>
              <option value="rareAsc">出にくい順</option>
              <option value="rareDesc">出やすい順</option>
              <option value="item">アイテム名順</option>
            </select>
            <div class="target-toggle" aria-label="表示対象">
              <button id="showAllButton" class="active" type="button">すべて</button>
              <button id="showTargetsButton" type="button">目標のみ</button>
            </div>
            <button id="resetButton" class="text-button" type="button">条件をリセット</button>
          </div>
        </div>

        <div id="targetPanel" class="target-panel" hidden>
          <div class="section-heading">
            <button id="toggleTargetPanelButton" class="target-panel-title" type="button">目標リスト</button>
            <button id="clearTargetsButton" class="text-button" type="button">全解除</button>
          </div>
          <div id="targetList" class="target-list"></div>
        </div>

        <div class="table-shell">
          <table id="resultTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
